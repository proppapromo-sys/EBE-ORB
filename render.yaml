# Render Blueprint — one service that serves the EBE API + web face.
# Deploy: push to GitHub → Render → New → Blueprint → pick this repo → set the secret env vars.
services:
  - type: web
    name: ebe-orb
    runtime: node
    plan: starter          # always-on ($7/mo) — no cold-start sleep for paying customers
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/orb/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # ── set these in the Render dashboard (sync:false = secret, prompted on deploy) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # optional features
      # ── AI video ──
      - key: RUNWAY_API_KEY           # RunwayML Gen-4 video (preferred engine when set)
        sync: false
      - key: ORB_VIDEO_PROVIDER       # optional: force "runway" or "veo"
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EBE_FROM_EMAIL
        sync: false
      - key: EBE_REPLY_TO
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ── Billing (Stripe) — charge customers per tier ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_BASE_URL          # e.g. https://ebe-orb.onrender.com (for checkout redirects)
        sync: false
      - key: ORB_OWNER_EMAILS         # comma-separated owner emails → always full top-tier access
        sync: false
      - key: STRIPE_PRICE_PERSONAL
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTREPRENEUR
        sync: false
      - key: STRIPE_PRICE_EXECUTIVE
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
